<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào mừng | Khoa's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8b3dff;
            --primary-hover: #6a1b9a;
            --accent-color: #ff8c00;
            --accent-light: #ffb74d;
            --bg-main: #f9f5ff;
            --bg-card: #ffffff;
            --card-border: #ebdfff;
            --text-main: #2d1b4e;
            --text-muted: #6b5c82;
            --shadow-sm: 0 4px 20px rgba(139,61,255,0.08);
            --shadow-md: 0 12px 35px rgba(139,61,255,0.15);
            --glass-bg: rgba(255,255,255,0.85);
            --glass-border: rgba(255,255,255,0.6);
        }
        [data-theme="dark"] {
            --primary-color: #9d5dff;
            --primary-hover: #7b2cbf;
            --accent-color: #ffa726;
            --accent-light: #ffcc80;
            --bg-main: #0f0a1f;
            --bg-card: #1a103c;
            --card-border: #3b28cc;
            --text-main: #f8f8f2;
            --text-muted: #a39eb8;
            --shadow-sm: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-md: 0 12px 35px rgba(0,0,0,0.6);
            --glass-bg: rgba(26,16,60,0.85);
            --glass-border: rgba(255,255,255,0.05);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 17px; scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(228,207,255,0.6), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255,238,173,0.6), transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(179,238,226,0.6), transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(200,240,255,0.6), transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(255,204,213,0.6), transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        [data-theme="dark"] body {
            background-image:
                radial-gradient(circle at 15% 50%, rgba(139,61,255,0.15), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255,140,0,0.15), transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0,191,255,0.15), transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(59,130,246,0.15), transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(236,72,153,0.15), transparent 50%);
        }

        /* ── Theme toggle (copied exactly) ── */
        .theme-toggle-wrapper {
            position: fixed;
            top: 30px;
            right: 40px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .theme-label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            transition: color 0.4s ease;
            user-select: none;
        }
        .theme-toggle { background: none; border: none; cursor: pointer; padding: 0; outline: none; display: flex; }
        .toggle-track {
            width: 64px; height: 32px;
            border-radius: 30px;
            background: linear-gradient(135deg, #ffb74d, #ff8c00);
            position: relative;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.1), 0 4px 12px rgba(255,140,0,0.3);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
        }
        .toggle-track::before {
            content: '';
            position: absolute;
            top: 50%; left: 35%;
            width: 30px; height: 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: 15px -5px 0 5px rgba(255,255,255,0.1);
            transition: all 0.5s ease;
        }
        [data-theme="dark"] .toggle-track {
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.5);
        }
        [data-theme="dark"] .toggle-track::before {
            width: 2px; height: 2px;
            background: white;
            box-shadow: 10px 5px 0 0 white, 25px -5px 0 1px white, 35px 10px 0 0 white, 15px -10px 0 0 white;
            border-radius: 50%;
            transform: translateY(-50%) scale(0.8);
        }
        .toggle-sun-moon {
            position: absolute;
            top: 4px; left: 4px;
            width: 24px; height: 24px;
            border-radius: 50%;
            background: #ffdf00;
            box-shadow: 0 0 10px rgba(255,223,0,0.8), inset -2px -2px 0 rgba(200,150,0,0.2);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            z-index: 2;
        }
        [data-theme="dark"] .toggle-sun-moon {
            left: calc(100% - 28px);
            background: transparent;
            box-shadow: inset -6px -4px 0 #cbd5e1, 0 0 15px rgba(255,255,255,0.3);
            transform: rotate(15deg);
        }

        /* ── Floating bubbles (exact copy from main site) ── */
        .tech-bubble {
            position: fixed;
            width: 65px; height: 65px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: float 6s infinite ease-in-out;
            z-index: 0;
        }
        [data-theme="dark"] .tech-bubble {
            background: rgba(26,16,60,0.7);
            border: 1px solid rgba(157,93,255,0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .tech-bubble svg { width: 32px; height: 32px; }
        .bubble-pink  { color: #ec4899; }
        .bubble-orange { color: #f97316; }
        .bubble-blue  { color: #3b82f6; }
        .bubble-green { color: #10b981; }
        .bubble-purple { color: #8b5cf6; }
        .bubble-1 { top:10%; left:18%; animation-delay:0s;   width:60px;height:60px; }
        .bubble-2 { top:20%; right:20%; animation-delay:1.2s; width:70px;height:70px; }
        .bubble-3 { top:60%; left:12%; animation-delay:2.4s; width:75px;height:75px; }
        .bubble-4 { top:75%; right:15%; animation-delay:3.6s; width:65px;height:65px; }
        .bubble-5 { top:30%; right:32%; animation-delay:1.5s; width:90px;height:90px; background:rgba(255,255,255,0.7); backdrop-filter:blur(12px); }
        .bubble-5 svg { width:45px; height:45px; }
        .bubble-6 { top:85%; left:55%; animation-delay:2.8s; width:60px;height:60px; }
        [data-theme="dark"] .bubble-5 { background:rgba(26,16,60,0.8); }

        @keyframes float {
            0%   { transform: translate(0,0) rotate(0deg); }
            25%  { transform: translate(15px,-25px) rotate(8deg); }
            50%  { transform: translate(-10px,15px) rotate(-5deg); }
            75%  { transform: translate(-20px,-10px) rotate(5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        /* ── Main layout ── */
        .welcome-stage {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            gap: 0;
        }

        /* ── Badge (matches .code-badge) ── */
        .code-badge {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(139,61,255,0.3);
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.2s;
        }

        /* ── Heading ── */
        .welcome-h1 {
            font-size: clamp(2.4rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.45s;
        }
        .welcome-h1 .name-line {
            background: linear-gradient(90deg, #3b28cc, #8b3dff, #1ca5db, #3b28cc);
            background-size: 300% 100%;
            animation: gradientShift 6s ease-in-out infinite, fadeUp 0.6s ease forwards 0.45s;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }
        .welcome-h1 .hello-line {
            display: block;
            background: linear-gradient(135deg, var(--accent-color), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin-bottom: 8px;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Subtitle ── */
        .welcome-sub {
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-muted);
            max-width: 550px;
            line-height: 1.7;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.65s;
        }
        .welcome-sub strong { 
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800; 
        }

        /* ── CTA button ── */
        .btn-enter {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(139,61,255,0.35);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.85s;
            position: relative;
            overflow: hidden;
        }
        .btn-enter::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn-enter:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(139,61,255,0.5); }
        .btn-enter:hover::before { opacity: 1; }
        .btn-enter svg { transition: transform 0.2s; }
        .btn-enter:hover svg { transform: translateX(4px); }

        /* ── Divider line ── */
        .divider-line {
            width: 80px; height: 4px;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            border-radius: 4px;
            margin: 0 auto 32px;
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.55s;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(8px); }
            to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        @media (max-width: 992px) {
            .theme-toggle-wrapper { top:15px; right:20px; }
            .theme-label { display: none; }
            .bubble-3,.bubble-5,.bubble-6 { display: none; }
        }
        @media (max-width: 600px) {
            .bubble-1,.bubble-2,.bubble-4 { display: none; }
        }
    </style>
</head>
<body>

    <!-- Theme Toggle (identical to main site) -->
    <div class="theme-toggle-wrapper">
        <span class="theme-label" id="theme-label">Chế độ Sáng</span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Chuyển đổi chế độ Sáng/Tối">
            <div class="toggle-track">
                <div class="toggle-sun-moon"></div>
            </div>
        </button>
    </div>

    <!-- Floating Bubbles (same as main site) -->
    <div class="tech-bubble bubble-pink bubble-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <div class="tech-bubble bubble-orange bubble-2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
    </div>
    <div class="tech-bubble bubble-blue bubble-3">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
    </div>
    <div class="tech-bubble bubble-green bubble-4">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
    </div>
    <div class="tech-bubble bubble-purple bubble-5">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
    </div>
    <div class="tech-bubble bubble-blue bubble-6">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
    </div>

    <!-- Welcome Content -->
    <div class="welcome-stage">
        <div class="code-badge">Hồ Sơ Của Tôi</div>

        <h1 class="welcome-h1">
            <span class="hello-line">Xin chào, mình là</span>
            <span class="name-line">Lê Huy Khoa.</span>
        </h1>

        <div class="divider-line"></div>

        <p class="welcome-sub">
            Sinh viên <strong>Công nghệ thông tin – UET VNU</strong>.<br>
            Đây là Digital Portfolio cuối kỳ môn Nhập môn Công nghệ số &amp; Ứng dụng Trí tuệ nhân tạo.
        </p>

        <a href="portfolio.html" class="btn-enter">
            Vào Portfolio
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
    </div>

    <script>
        // ── Theme toggle (same logic as main site) ──
        const html = document.documentElement;
        const btn  = document.getElementById('theme-toggle');
        const lbl  = document.getElementById('theme-label');

        // Sync with saved preference
        const saved = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', saved);
        lbl.textContent = saved === 'dark' ? 'Chế độ Tối' : 'Chế độ Sáng';

        btn.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            const next   = isDark ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            lbl.textContent = next === 'dark' ? 'Chế độ Tối' : 'Chế độ Sáng';
            localStorage.setItem('theme', next);
        });

        // Fade out on navigate with WOW effect
        document.querySelector('.btn-enter').addEventListener('click', function(e) {
            e.preventDefault();
            document.body.style.transition = 'all 1s cubic-bezier(0.4, 0, 0.2, 1)';
            document.body.style.opacity = '0';
            document.body.style.transform = 'scale(1.1) translateY(-20px)';
            document.body.style.filter = 'blur(12px)';
            setTimeout(() => { window.location.href = this.href; }, 900);
        });
    </script>
</body>
</html>
